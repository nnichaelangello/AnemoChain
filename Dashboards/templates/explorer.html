<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperledger Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-700 tracking-tight">Hyperledger Blockchain Explorer</h1>
            <button onclick="loadLedger()" class="bg-indigo-600 hover:bg-indigo-700 font-bold text-white px-6 py-2 rounded-lg shadow transition duration-200">Refresh Ledger</button>
        </div>

        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-indigo-500">
                <h3 class="text-gray-500 font-semibold uppercase tracking-wider text-sm">Total Blocks Mined</h3>
                <p id="totalBlocks" class="text-4xl font-bold text-gray-800 mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-emerald-500">
                <h3 class="text-gray-500 font-semibold uppercase tracking-wider text-sm">Network Node Status</h3>
                <p class="text-4xl font-bold text-emerald-600 mt-2">Active</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-purple-500">
                <h3 class="text-gray-500 font-semibold uppercase tracking-wider text-sm">Consensus Algorithm</h3>
                <p class="text-2xl font-bold text-purple-600 mt-3">Proof of Authority</p>
            </div>
        </div>

        <div id="blocks" class="space-y-6">
            <!-- Blocks -->
        </div>
    </div>

    <script>
        async function loadLedger() {
            try {
                const response = await fetch(`{{ blockchain_url }}/api/ledger`);
                const data = await response.json();
                
                document.getElementById('totalBlocks').innerText = data.length;
                
                let html = '';
                // Reverse so newest blocks are at top
                data.chain.slice().reverse().forEach(block => {
                    let txHtml = '';
                    if (block.transactions.length === 0) {
                        txHtml = '<p class="text-sm text-gray-500 italic mt-2 bg-gray-50 p-4 rounded-lg border">Genesis Block / No Transactions (Jaringan Diinisialisasi)</p>';
                    } else {
                        block.transactions.forEach(tx => {
                            txHtml += `
                            <div class="mt-4 p-5 bg-blue-50 rounded-lg border border-blue-100 text-sm">
                                <p class="mb-1"><span class="text-gray-600 font-semibold">Transaction ID:</span> <span class="font-mono text-blue-800">${tx.tx_id}</span></p>
                                <p class="mb-1"><span class="text-gray-600 font-semibold">Patient ID (Pseudonym):</span> <span class="font-medium text-gray-800">${tx.patient_id}</span></p>
                                <p class="mb-1"><span class="text-gray-600 font-semibold">Status:</span> <span class="font-medium ${tx.status === 'Anemia' ? 'text-red-600' : 'text-green-600'}">${tx.status || 'Unknown'}</span></p>
                                <p class="mb-3"><span class="text-gray-600 font-semibold">Timestamp:</span> ${new Date(tx.timestamp).toLocaleString()}</p>
                                
                                ${tx.color_details ? `
                                <div class="bg-white p-3 rounded border border-gray-200 mb-3 text-xs text-gray-700">
                                    <span class="text-gray-600 font-semibold block mb-1">Rincian Warna (RGB/LAB/HSV):</span>
                                    <pre class="font-mono bg-gray-50 p-2 rounded">${JSON.stringify(JSON.parse(tx.color_details), null, 2)}</pre>
                                </div>
                                ` : ''}

                                <div class="bg-white p-3 rounded border border-gray-200">
                                    <span class="text-gray-600 font-semibold block mb-1">Encrypted SHA-256 Hash:</span> 
                                    <span class="text-emerald-700 font-mono break-all">${tx.data_hash}</span>
                                </div>
                            </div>
                            `;
                        });
                    }

                    html += `
                    <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition duration-150">
                        <div class="flex justify-between items-center border-b border-gray-100 pb-4 mb-5">
                            <h2 class="text-2xl text-indigo-700 font-bold">Block #${block.index}</h2>
                            <span class="text-sm font-mono text-gray-500 bg-gray-100 px-3 py-1 rounded-full">Nonce: ${block.nonce}</span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div>
                                <p class="text-xs text-gray-500 uppercase font-semibold mb-1">Block Hash</p>
                                <p class="font-mono text-sm break-all text-indigo-600 bg-indigo-50 p-2 rounded">${block.hash}</p>
                            </div>
                            <div>
                                <p class="text-xs text-gray-500 uppercase font-semibold mb-1">Previous Hash (Linked)</p>
                                <p class="font-mono text-sm break-all text-gray-500 bg-gray-50 p-2 rounded">${block.previous_hash}</p>
                            </div>
                        </div>
                        
                        <h4 class="font-bold text-gray-800 text-lg mb-2 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            Transactions In Block
                        </h4>
                        ${txHtml}
                    </div>
                    `;
                });
                document.getElementById('blocks').innerHTML = html;

            } catch (e) {
                document.getElementById('blocks').innerHTML = '<p class="text-red-600 p-4 bg-red-50 rounded-lg border border-red-200">Gagal memuat ledger. Pastikan node Hyperledger berjalan (Port 8001).</p>';
            }
        }

        // Load initially
        loadLedger();
    </script>
</body>
</html>
